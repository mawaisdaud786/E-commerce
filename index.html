<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Cart System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">Mini E-Commerce Cart</h1>
  <div class="container">

    <!-- Products Section -->
    <div class="products">
      <h2>Products</h2> <br>
      <input type="text" id="searchInput" placeholder="Search products...">
      <div id="product-list">
        <!-- Product cards will be rendered here via JS -->
      </div>
    </div>

    <!-- Cart Section -->
    <div class="cart">
      <h2>Your Cart</h2>
      <ul id="cart-list">
        <!-- Cart items rendered here -->
      </ul>
      <h3 id="total">Total: Rs 0</h3>
      <button id="clearBtn">Clear Cart</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
